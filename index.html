<head>

  <script>

    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #555;
      color: #f5c800;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- header ---- */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: #3a3a3a;
      border-bottom: 1px solid #f5c80033;
      display: none;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 90;
    }
    #header.visible { display: flex; }

    .header-title {
      color: #f5c800;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      flex: 1;
    }

    .header-btn {
      background: transparent;
      border: 1px solid #f5c80066;
      color: #f5c800;
      padding: 4px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .header-btn:hover { background: #f5c80022; border-color: #f5c800; }
    .header-btn:active { transform: scale(0.96); }

    .mode-btn { opacity: 0.45; }
    .mode-btn.active { opacity: 1; background: #f5c80018; border-color: #f5c800; }

    /* ---- overlay ---- */
    #overlay {
      position: fixed;
      inset: 0;
      background: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #overlay h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.1em;
      text-align: center;
      text-shadow: 0 0 30px #f5c800aa;
    }

    #overlay p { color: #111; font-size: 1rem; }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 320px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 10px;
      color: #111;
      font-size: 0.85rem;
    }

    .control-row label { min-width: 50px; color: #111; }

    .control-row input[type=range] {
      flex: 1;
      accent-color: #f5c800;
      cursor: pointer;
    }

    .control-row select {
      flex: 1;
      background: #444;
      color: #f5c800;
      border: 1px solid #f5c800;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 4px 6px;
      cursor: pointer;
      outline: none;
    }

    .control-row .val {
      min-width: 30px;
      text-align: right;
      color: #f5c800;
      font-size: 0.8rem;
    }

    #start-btn {
      background: #f5c800;
      color: #0a0a00;
      border: none;
      padding: 16px 48px;
      font-size: 1.4rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 0 20px #f5c80066;
      margin-top: 8px;
    }

    #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #f5c800aa; }
    #start-btn:active { transform: scale(0.97); }

    /* ---- words ---- */
    #words {
      padding: 64px 5vw 200px;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      line-height: 1.9;
      word-spacing: 0.25em;
      max-width: 100%;
    }

    .word {
      display: inline;
      color: #555;
      transition: color 0.08s ease;
    }

    .word.lit-yellow { color: #f5c800; }
    .word.lit-black  { color: #111; }

    /* ---- falling word clones ---- */
    .falling-word {
      position: absolute;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
      line-height: 1;
      transform-origin: center center;
    }

    /* ---- HUD ---- */
    #hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px 16px;
      background: linear-gradient(transparent, #555555dd 40%, #555);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #hud.visible { opacity: 1; pointer-events: all; }

    #pause-btn {
      background: transparent;
      border: 1px solid #f5c800;
      color: #f5c800;
      padding: 6px 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #pause-btn:hover { background: #f5c80022; }

    #hud-speed-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      color: #111;
      font-size: 0.75rem;
    }

    #live-speed {
      accent-color: #f5c800;
      width: 100px;
      cursor: pointer;
    }

    #progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #progress {
      position: relative;
      height: 6px;
      background: #333;
      border-radius: 3px;
    }

    #progress-bar {
      height: 100%;
      background: #f5c800;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s linear;
    }

    .milestone {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid #333;
      cursor: pointer;
      z-index: 2;
    }

    .milestone.reached { background: #f5c800; border-color: #f5c800; }

    .milestone-label {
      position: absolute;
      bottom: 14px;
      transform: translateX(-50%);
      background: #222;
      color: #f5c800;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      padding: 3px 6px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .milestone:hover .milestone-label,
    .milestone.reached:hover .milestone-label { opacity: 1; }

    #word-count {
      color: #333;
      font-size: 0.75rem;
      min-width: 90px;
      text-align: right;
      flex-shrink: 0;
    }

    #milestone-toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #111;
      color: #f5c800;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 10px 20px;
      border: 1px solid #f5c800;
      border-radius: 4px;
      z-index: 200;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      max-width: 80vw;
    }

    #milestone-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ---- leaderboard ---- */
    #leaderboard {
      width: 300px;
      background: #44444466;
      border: 1px solid #f5c80033;
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 0.75rem;
    }

    #leaderboard h3 {
      color: #f5c800;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      text-align: center;
    }

    .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #ffffff11;
      gap: 6px;
    }

    .lb-row:last-child { border-bottom: none; }

    .lb-rank { color: #f5c800; min-width: 18px; }
    .lb-name { color: #ddd; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { color: #f5c800; text-align: right; min-width: 40px; }
    .lb-row.me .lb-name, .lb-row.me .lb-score { color: #fff; font-weight: bold; }

    /* ---- bees ---- */
    .bee {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      image-rendering: pixelated;
    }

    @keyframes fly-right {
      from { transform: translateX(-120px) scaleX(1); }
      to   { transform: translateX(calc(100vw + 120px)) scaleX(1); }
    }
    @keyframes fly-left {
      from { transform: translateX(calc(100vw + 120px)) scaleX(-1); }
      to   { transform: translateX(-120px) scaleX(-1); }
    }
    @keyframes wobble {
      0%,100% { margin-top: 0; }
      50%      { margin-top: 18px; }
    }
  </style>
</head>
<body>

<!-- header — visible only during gameplay -->
<div id="header">
  <span class="header-title">🐝 beelieveInYourself</span>
  <button class="header-btn" id="save-btn">SAVE</button>
  <button class="header-btn mode-btn active" id="mode-list">LIST</button>
  <button class="header-btn mode-btn" id="mode-fall">FALL</button>
</div>

<div id="overlay">
  <h1>🐝 beelieveInYourself</h1>
  <p>according to all known laws of aviation...</p>
  <div class="controls">
    <div class="control-row">
      <label>name</label>
      <input type="text" id="player-name" maxlength="20" placeholder="enter your name"
        style="flex:1; background:#444; color:#f5c800; border:1px solid #f5c800;
               font-family:'Courier New',monospace; font-size:0.85rem; padding:4px 8px; outline:none;" />
    </div>

    <div class="control-row">
      <label>speed</label>
      <input type="range" id="speed" min="1" max="38" value="12" />

    <div class="control-row">
      <label>pitch</label>

    <a href="beelieve.html" style="color:#111; font-size:0.75rem; letter-spacing:0.1em; text-decoration:none; margin-top:4px;">how was this made? →</a>

    <div id="leaderboard">
      <h3>🏆 leaderboard</h3>
      <div id="lb-rows"><div style="color:#666;text-align:center;padding:8px">loading...</div></div>

</div>

<div id="bees"></div>
<div id="words"></div>
<div id="milestone-toast"></div>

<div id="hud">
  <button id="pause-btn">PAUSE</button>
  <div id="hud-speed-wrap">
    <span>spd</span>
    <input type="range" id="live-speed" min="1" max="38" value="12" />
  </div>
  <div id="progress-wrap">
    <div id="progress">
      <div id="progress-bar"></div>
    </div>
  </div>
  <span id="word-count">0 / 0</span>
</div>

<script>
  const SCRIPT_FILE = 'vibes.txt';

  const MILESTONES = [
    { pct:  0.5, icon: '🐝', label: 'Yellow, black. Yellow, black.' },
    { pct:  3.3, icon: '🎓', label: 'Graduation Day' },
    { pct:  7.6, icon: '🌻', label: 'Pollen Jocks!' },
    { pct: 23.9, icon: '🌸', label: 'She saved my life' },
    { pct: 24.6, icon: '🎷', label: 'You like jazz?' },
    { pct: 34.1, icon: '🧠', label: 'Thinking bee!' },
    { pct: 41.1, icon: '🍯', label: 'Honey Farms discovered' },
    { pct: 54.6, icon: '⚖️',  label: 'The trial begins' },
    { pct: 58.9, icon: '🎤', label: 'Mr. Sting takes the stand' },
    { pct: 74.4, icon: '✊', label: 'FREE THE BEES!' },
    { pct: 74.6, icon: '🏆', label: 'The bees win!' },
    { pct: 79.5, icon: '🌺', label: 'Flowers are dying...' },
    { pct: 88.9, icon: '✈️',  label: 'Barry flies the plane' },
    { pct: 95.7, icon: '🛬', label: 'Barry, we did it!' },
    { pct: 100,  icon: '🎬', label: 'No rehearsal for that.' },
  ];

  const lbPanel      = document.getElementById('leaderboard');
  const lbRows       = document.getElementById('lb-rows');
  const playerNameEl = document.getElementById('player-name');
  const overlay      = document.getElementById('overlay');
  const wordsEl      = document.getElementById('words');
  const hud          = document.getElementById('hud');
  const header       = document.getElementById('header');
  const pauseBtn     = document.getElementById('pause-btn');
  const speedEl      = document.getElementById('speed');
  const speedVal     = document.getElementById('speed-val');
  const pitchEl      = document.getElementById('pitch');
  const pitchVal     = document.getElementById('pitch-val');
  const voiceSelect  = document.getElementById('voice-select');
  const liveSpeed    = document.getElementById('live-speed');
  const progressBar  = document.getElementById('progress-bar');
  const progressEl   = document.getElementById('progress');
  const wordCount    = document.getElementById('word-count');
  const startBtn     = document.getElementById('start-btn');
  const toast        = document.getElementById('milestone-toast');
  const saveBtnEl    = document.getElementById('save-btn');
  const modeListBtn  = document.getElementById('mode-list');
  const modeFallBtn  = document.getElementById('mode-fall');

  let playerName = 'anonymous';
  let scoreSaved = false;

  // --- leaderboard ---
  const BIN_URL = `https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN}`;
  const BIN_HEADERS = {
    'X-Master-Key': CONFIG.JSONBIN_KEY,
    'Content-Type': 'application/json'
  };

  async function fetchScores() {
    try {
      const res = await fetch(BIN_URL, { headers: { 'X-Master-Key': CONFIG.JSONBIN_KEY } });
      const data = await res.json();
      return data.record.scores || [];
    } catch { return []; }
  }

  async function saveScore(name, score) {
    if (scoreSaved || score < 10) return;
    scoreSaved = true;
    const scores = await fetchScores();
    scores.push({ name, score, date: new Date().toISOString().slice(0, 10) });
    scores.sort((a, b) => b.score - a.score);
    const top50 = scores.slice(0, 50);
    try {
      await fetch(BIN_URL, {
        method: 'PUT',
        headers: BIN_HEADERS,
        body: JSON.stringify({ scores: top50 }),
        keepalive: true
      });
      renderLeaderboard(top50, name);
    } catch {}
  }

  function renderLeaderboard(scores, highlightName) {
    lbRows.innerHTML = '';
    const top10 = scores.slice(0, 10);
    top10.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row' + (s.name === highlightName ? ' me' : '');
      row.innerHTML = `
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.score.toLocaleString()}</span>
      `;
      lbRows.appendChild(row);
    });
    if (!top10.length) lbRows.innerHTML = '<div style="color:#666;text-align:center;padding:8px">no scores yet</div>';
  }

  async function loadLeaderboard() {
    const scores = await fetchScores();
    renderLeaderboard(scores, playerName);
  }

  loadLeaderboard();

  window.addEventListener('beforeunload', () => {
    if (running || litCount > 0) saveScore(playerName, litCount);
  });

  let words        = [];
  let spans        = [];
  let sentences    = [];
  let sentIdx      = 0;
  let litCount     = 0;
  let paused       = false;
  let running      = false;
  let toastTimer   = null;
  let nextMilestone = 0;
  let voices       = [];

  // --- voices ---
  function loadVoices() {
    const all = speechSynthesis.getVoices();
    voices = all.filter(v => v.lang.startsWith('en'));
    voiceSelect.innerHTML = '';
    if (!voices.length) { voiceSelect.innerHTML = '<option>no voices found</option>'; return; }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.default || v.lang === 'en-US') opt.selected = true;
      voiceSelect.appendChild(opt);
    });
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  let voiceRetries = 0;
  const voiceRetryTimer = setInterval(() => {
    if (voices.length || voiceRetries++ > 10) { clearInterval(voiceRetryTimer); return; }
    loadVoices();
  }, 300);

  function ttsRate() {
    return 0.5 + (+liveSpeed.value - 1) / 37 * 1.5;
  }

  speedEl.addEventListener('input', () => { speedVal.textContent = speedEl.value; });
  pitchEl.addEventListener('input', () => { pitchVal.textContent = parseFloat(pitchEl.value).toFixed(2); });

  // --- toast ---
  function showToast(text) {
    clearTimeout(toastTimer);
    toast.textContent = text;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // --- milestones ---
  function buildMilestones() {
    MILESTONES.forEach((m, i) => {
      const dot = document.createElement('div');
      dot.className = 'milestone';
      dot.id = `ms-${i}`;
      dot.style.left = m.pct + '%';
      const lbl = document.createElement('div');
      lbl.className = 'milestone-label';
      lbl.textContent = `${m.icon} ${m.label}`;
      dot.appendChild(lbl);
      progressEl.appendChild(dot);
    });
  }

  function checkMilestones(pct) {
    while (nextMilestone < MILESTONES.length && pct >= MILESTONES[nextMilestone].pct) {
      const m = MILESTONES[nextMilestone];
      document.getElementById(`ms-${nextMilestone}`)?.classList.add('reached');
      showToast(`${m.icon} ${m.label}`);
      nextMilestone++;
    }
  }

  // --- pre-render all words as grey spans ---
  function renderAll() {
    words.forEach((w) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w + ' ';
      wordsEl.appendChild(span);
      spans.push(span);
    });
  }

  // --- build sentence list with char→word maps ---
  function buildSentences() {
    const end = /[.!?]$/;
    let start = 0;
    for (let i = 0; i < words.length; i++) {
      if (end.test(words[i]) || i === words.length - 1) {
        const slice = words.slice(start, i + 1);
        const charMap = [];
        let pos = 0;
        slice.forEach((w, wi) => {
          for (let c = 0; c < w.length; c++) charMap[pos + c] = start + wi;
          pos += w.length + 1;
        });
        sentences.push({ start, end: i + 1, text: slice.join(' '), charMap });
        start = i + 1;
      }
    }
  }

  // =============================================
  // FALL MODE — Matter.js physics
  // =============================================
  let fallMode    = false;
  let fallEngine  = null;
  let fallWorld   = null;
  let fallBodies  = [];   // { body, el, span }
  let fallInited  = false;

  function initFall() {
    if (fallInited) return;
    fallInited = true;

    fallEngine = Matter.Engine.create();
    fallWorld  = fallEngine.world;
    fallEngine.gravity.y = 1.2;

    // ground sits below all current content
    const groundY = Math.max(document.body.scrollHeight, 4000) + 60;
    document.body.style.minHeight = (groundY + 400) + 'px';

    const ground    = Matter.Bodies.rectangle(window.innerWidth / 2, groundY + 30, window.innerWidth * 4, 60, { isStatic: true });
    const leftWall  = Matter.Bodies.rectangle(-30, groundY / 2, 60, groundY * 2, { isStatic: true });
    const rightWall = Matter.Bodies.rectangle(window.innerWidth + 30, groundY / 2, 60, groundY * 2, { isStatic: true });
    Matter.World.add(fallWorld, [ground, leftWall, rightWall]);

    // physics tick
    setInterval(() => Matter.Engine.update(fallEngine, 1000 / 60), 1000 / 60);

    // DOM sync loop
    (function raf() {
      requestAnimationFrame(raf);
      fallBodies.forEach(({ body, el }) => {
        el.style.left      = (body.position.x - el.offsetWidth  / 2) + 'px';
        el.style.top       = (body.position.y - el.offsetHeight / 2) + 'px';
        el.style.transform = `rotate(${body.angle}rad)`;
      });
    })();
  }

  function dropSpan(span) {
    if (span._falling) return;
    span._falling = true;

    const rect = span.getBoundingClientRect();
    const docX = rect.left + rect.width  / 2 + window.scrollX;
    const docY = rect.top  + rect.height / 2 + window.scrollY;

    // clone floats in document space
    const el = document.createElement('span');
    el.className = 'falling-word';
    el.textContent = span.textContent.trim();
    el.style.color = span.classList.contains('lit-yellow') ? '#f5c800' : '#111';
    el.style.left = '-9999px';
    el.style.top  = '-9999px';
    document.body.appendChild(el);

    const w = Math.max(el.offsetWidth,  10) + 6;
    const h = Math.max(el.offsetHeight, 10) + 6;

    const body = Matter.Bodies.rectangle(docX, docY, w, h, {
      restitution: 0.4,
      friction:    0.3,
      frictionAir: 0.012,
      angle: (Math.random() - 0.5) * 0.4,
    });
    Matter.Body.setVelocity(body, {
      x: (Math.random() - 0.5) * 4,
      y: 2 + Math.random() * 2,
    });
    Matter.World.add(fallWorld, body);
    fallBodies.push({ body, el, span });

    span.style.visibility = 'hidden';
  }

  function dropAllLit() {
    initFall();
    spans.forEach(span => {
      if (
        (span.classList.contains('lit-yellow') || span.classList.contains('lit-black'))
        && !span._falling
      ) {
        dropSpan(span);
      }
    });
  }

  // --- mode buttons ---
  modeListBtn.addEventListener('click', () => {
    fallMode = false;
    modeListBtn.classList.add('active');
    modeFallBtn.classList.remove('active');
  });

  modeFallBtn.addEventListener('click', () => {
    fallMode = true;
    modeFallBtn.classList.add('active');
    modeListBtn.classList.remove('active');
    if (running) dropAllLit();
  });

  // --- save button ---
  saveBtnEl.addEventListener('click', () => {
    if (litCount > 0) {
      scoreSaved = false;
      saveScore(playerName, litCount);
      saveBtnEl.textContent = 'SAVED!';
      setTimeout(() => { saveBtnEl.textContent = 'SAVE'; }, 1800);
    }
  });

  // --- light up a word ---
  function lightWord(globalIdx) {
    if (globalIdx >= spans.length) return;
    spans[globalIdx].classList.add(globalIdx % 2 === 0 ? 'lit-yellow' : 'lit-black');
    litCount = Math.max(litCount, globalIdx + 1);

    const pct = litCount / words.length * 100;
    progressBar.style.width = pct.toFixed(1) + '%';
    wordCount.textContent = `${litCount.toLocaleString()} / ${words.length.toLocaleString()}`;
    checkMilestones(pct);

    spans[globalIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });

    // schedule fall after 3s if in fall mode
    if (fallMode) {
      const captured = spans[globalIdx];
      setTimeout(() => {
        if (fallMode && !captured._falling) dropSpan(captured);
      }, 3000);
    }
  }

  // --- speak a sentence ---
  function speakSentence(si) {
    if (!running || paused || si >= sentences.length) {
      if (si >= sentences.length) {
        running = false;
        saveScore(playerName, litCount);
      }
      return;
    }

    const s = sentences[si];
    const utt = new SpeechSynthesisUtterance(s.text);
    utt.pitch = parseFloat(pitchEl.value);
    utt.rate  = ttsRate();
    const vi = parseInt(voiceSelect.value);
    if (voices[vi]) utt.voice = voices[vi];

    utt.onboundary = (e) => {
      if (e.name !== 'word') return;
      const globalIdx = s.charMap[e.charIndex];
      if (globalIdx !== undefined) lightWord(globalIdx);
    };

    utt.onstart = () => {
      lightWord(s.start);
      speakSentence(si + 1);
    };

    utt.onend = () => {
      for (let i = s.start; i < s.end; i++) {
        if (!spans[i].classList.contains('lit-yellow') && !spans[i].classList.contains('lit-black')) {
          lightWord(i);
        }
      }
    };

    speechSynthesis.speak(utt);
    sentIdx = si + 1;
  }

  // --- pause / resume ---
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    if (paused) {
      speechSynthesis.pause();
      if (litCount > 0) saveScore(playerName, litCount);
    } else {
      scoreSaved = false;
      speechSynthesis.resume();
    }
  });

  // --- bees ---
  (function spawnBees() {
    const container = document.getElementById('bees');
    const BEE_COUNT = 22;

    for (let i = 0; i < BEE_COUNT; i++) {
      const bee = document.createElement('img');
      bee.src = 'bee.png';
      bee.className = 'bee';

      const goRight   = Math.random() > 0.5;
      const size      = 108 + Math.random() * 216;
      const topPct    = 2 + Math.random() * 88;
      const duration  = 6 + Math.random() * 18;
      const delay     = -(Math.random() * duration);
      const wobbleDur = 1.2 + Math.random() * 1.8;

      bee.style.cssText = `
        width: ${size}px;
        top: ${topPct}vh;
        animation:
          ${goRight ? 'fly-right' : 'fly-left'} ${duration}s ${delay}s linear infinite,
          wobble ${wobbleDur}s ease-in-out infinite;
        opacity: ${0.55 + Math.random() * 0.45};
      `;

      container.appendChild(bee);
    }
  })();

  // --- start ---
  startBtn.addEventListener('click', async () => {
    playerName = playerNameEl.value.trim() || 'anonymous';
    liveSpeed.value = speedEl.value;

    const res = await fetch(SCRIPT_FILE);
    if (!res.ok) { alert('Could not load vibes.txt'); return; }
    const text = await res.text();

    words = text.trim().split(/\s+/);
    wordCount.textContent = `0 / ${words.length.toLocaleString()}`;

    renderAll();
    buildSentences();
    buildMilestones();

    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    hud.classList.add('visible');
    header.classList.add('visible');
    loadLeaderboard();

    running = true;
    speakSentence(0);
  });
</script>
</body>
</html>
