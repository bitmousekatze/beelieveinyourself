  let _dailyBonus = 0, _dailyStreak = 0;
  (function calcDailyBonus() {
    const today = new Date().toISOString().slice(0, 10);
    if (progress.lastLoginDate === today) return;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    progress.loginStreak = (progress.lastLoginDate === yesterday) ? progress.loginStreak + 1 : 1;
    progress.lastLoginDate = today;
    _dailyBonus  = 69 * Math.pow(2, progress.loginStreak - 1);
    _dailyStreak = progress.loginStreak;
    progress.beesTotal += _dailyBonus;
    saveProgress(progress);
  })();

    } else if (type === 'runs') {

      ACHIEVEMENTS.filter(a => a.cat==='runs').forEach(a => { if (val >= a.threshold) unlockAch(a.id); });

  function spawnVirtualMouse() {
    const el = document.createElement('div');
    el.className = 'vmouse';
    el.textContent = '🖱️';
    el.style.left = Math.random() * window.innerWidth + 'px';
    el.style.top  = (44 + Math.random() * (window.innerHeight - 100)) + 'px';
    document.body.appendChild(el);

    function hunt() {
      if (!el.isConnected) return;
      if (!running || paused) { setTimeout(hunt, 500); return; }
      const bees = Array.from(document.querySelectorAll('.bee.catchable'));
      const visible = bees.filter(b => {
        const r = b.getBoundingClientRect();
        return r.right > 0 && r.left < window.innerWidth && r.top > 44;
      });

      let tx, ty;
      if (visible.length) {
        const target = visible[Math.floor(Math.random() * visible.length)];
        const r = target.getBoundingClientRect();
        tx = r.left + r.width  / 2 - 11;
        ty = r.top  + r.height / 2 - 11;
      } else {
        tx = 50 + Math.random() * (window.innerWidth  - 100);
        ty = 60 + Math.random() * (window.innerHeight - 120);
      }

      el.style.left = Math.max(0, Math.min(window.innerWidth  - 28, tx)) + 'px';
      el.style.top  = Math.max(44, Math.min(window.innerHeight - 28, ty)) + 'px';

      setTimeout(() => {
        el.classList.add('clicking');
        setTimeout(() => el.classList.remove('clicking'), 200);
        setTimeout(hunt, 300 + Math.random() * 500);
      }, 700);
    }

    hunt();
    return { el };
  }

  function syncVirtualMice() {

    for (let i=0;i<words.length;i++) {
      if (end.test(words[i])||i===words.length-1) {
        const slice=words.slice(start,i+1); const charMap=[]; let pos=0;
        slice.forEach((w,wi) => { for (let c=0;c<w.length;c++) charMap[pos+c]=start+wi; pos+=w.length+1; });
        sentences.push({start,end:i+1,text:slice.join(' '),charMap}); start=i+1;

  (function masterRAF() {
    requestAnimationFrame(masterRAF);
    fallBodies.forEach(({body,el}) => {
      el.style.left=(body.position.x-el.offsetWidth/2)+'px';
      el.style.top=(body.position.y-el.offsetHeight/2)+'px';
      el.style.transform=`rotate(${body.angle}rad)`;
    });
    bouncingWords.forEach(bw => {
      bw.x+=bw.vx; bw.y+=bw.vy;
      const w=bw.el.offsetWidth,h=bw.el.offsetHeight;
      if (bw.x<0)                     {bw.x=0;                    bw.vx= Math.abs(bw.vx);}
      if (bw.x+w>window.innerWidth)   {bw.x=window.innerWidth-w;  bw.vx=-Math.abs(bw.vx);}
      if (bw.y<44)                    {bw.y=44;                    bw.vy= Math.abs(bw.vy);}
      if (bw.y+h>window.innerHeight)  {bw.y=window.innerHeight-h; bw.vy=-Math.abs(bw.vy);}
      bw.el.style.left=bw.x+'px'; bw.el.style.top=bw.y+'px';
    });
  })();

  let fallEngine=null,fallWorld=null,fallInited=false,fallGround=null,fallLeft=null,fallRight=null,fallFloorY=0;
  function viewportBottom() { return window.scrollY+window.innerHeight-50; }
  function initFall() {
    if (fallInited) return; fallInited=true; fallFloorY=viewportBottom();
    fallEngine=Matter.Engine.create(); fallWorld=fallEngine.world; fallEngine.gravity.y=1.2;
    fallGround=Matter.Bodies.rectangle(window.innerWidth/2,fallFloorY+30,window.innerWidth*4,60,{isStatic:true});
    fallLeft  =Matter.Bodies.rectangle(-30,fallFloorY/2,60,fallFloorY*2,{isStatic:true});
    fallRight =Matter.Bodies.rectangle(window.innerWidth+30,fallFloorY/2,60,fallFloorY*2,{isStatic:true});
    Matter.World.add(fallWorld,[fallGround,fallLeft,fallRight]);
    window.addEventListener('scroll',()=>{
      const ny=viewportBottom(); if (ny<=fallFloorY) return; fallFloorY=ny;
      Matter.Body.setPosition(fallGround,{x:window.innerWidth/2,y:fallFloorY+30});
      Matter.Body.setPosition(fallLeft,  {x:-30,                 y:fallFloorY/2 });
      Matter.Body.setPosition(fallRight, {x:window.innerWidth+30,y:fallFloorY/2 });
    });
    setInterval(()=>Matter.Engine.update(fallEngine,1000/60),1000/60);
  }

  function dropFall(span) {
    if (span._dispatched) return; span._dispatched=true; initFall();
    const rect=span.getBoundingClientRect();
    const docX=rect.left+rect.width/2+window.scrollX;
    const docY=rect.top+rect.height/2+window.scrollY;
    const startY=Math.min(docY,fallFloorY-20);
    const el=document.createElement('span'); el.className='fly-word'; el.style.position='absolute'; el.style.left='-9999px'; el.style.top='-9999px';
    el.textContent=span.textContent.trim(); el.style.color=span.style.color||'#f5c800';
    document.body.appendChild(el);
    const w=Math.max(el.offsetWidth,10)+6, h=Math.max(el.offsetHeight,10)+6;
    const body=Matter.Bodies.rectangle(docX,startY,w,h,{restitution:0.4,friction:0.3,frictionAir:0.012,angle:(Math.random()-0.5)*0.4});
    Matter.Body.setVelocity(body,{x:(Math.random()-0.5)*4,y:2+Math.random()*2});
    Matter.World.add(fallWorld,body); fallBodies.push({body,el,span}); span.style.visibility='hidden';
  }
  function dropFloat(span) {
    if (span._dispatched) return; span._dispatched=true;
    const rect=span.getBoundingClientRect();
    const el=document.createElement('span'); el.className='fly-word'; el.style.position='fixed';
    el.style.left=rect.left+'px'; el.style.top=rect.top+'px'; el.style.color=span.style.color||'#f5c800';
    el.style.animation=`float-up ${2+Math.random()}s ease-in forwards`; el.textContent=span.textContent.trim();
    document.body.appendChild(el); span.style.visibility='hidden'; setTimeout(()=>el.remove(),3200);
  }
  function dropBounce(span) {
    if (span._dispatched) return; span._dispatched=true;
    const rect=span.getBoundingClientRect();
    const el=document.createElement('span'); el.className='fly-word'; el.style.position='fixed';
    el.style.left=rect.left+'px'; el.style.top=rect.top+'px'; el.style.color=span.style.color||'#f5c800';
    el.textContent=span.textContent.trim(); document.body.appendChild(el); span.style.visibility='hidden';
    const speed=2.5+Math.random()*4, angle=Math.random()*Math.PI*2;
    bouncingWords.push({el,x:rect.left,y:rect.top,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed});
  }

  function dropWord(span) {
    if (displayMode==='fall')   dropFall(span);

  const modeBtns = document.querySelectorAll('.mode-btn');
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      displayMode = btn.id.replace('mode-','');
      modeBtns.forEach(b=>b.classList.remove('active')); btn.classList.add('active');
      if (displayMode!=='list'&&running) dropAllLit();
      // mode discovery achievement
      const achId = 'mode_' + displayMode;
      if (ACHIEVEMENTS.find(a=>a.id===achId)) unlockAch(achId);
    });
  });

  let colorMode='bee';
  const RAINBOW_COLORS=['#ff3333','#ff8800','#ffee00','#33dd55','#3399ff','#aa44ff','#ff44cc'];
  function getWordColor(i) {
    switch(colorMode) {
      case 'rainbow': return RAINBOW_COLORS[i%RAINBOW_COLORS.length];
      case 'matrix':  return `hsl(120,100%,${35+(i%6)*6}%)`;
      case 'chaos':   return `hsl(${Math.round(i*137.508)%360},90%,62%)`;
      default:        return i%2===0?'#f5c800':'#111111';
    }
  }

  const cmodeButtons = document.querySelectorAll('.cmode-btn');
  cmodeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      colorMode = btn.id.replace('cmode-','');
      cmodeButtons.forEach(b=>b.classList.remove('active')); btn.classList.add('active');
      spans.forEach((s,i)=>{if(s.classList.contains('lit'))s.style.color=getWordColor(i);});
      // color mode discovery achievement
      const achId = 'mode_' + colorMode;
      if (ACHIEVEMENTS.find(a=>a.id===achId)) unlockAch(achId);
    });
  });

  saveBtnEl.addEventListener('click', () => {
    if (playerName) { saveScore(playerName); saveBtnEl.textContent='SAVED!'; setTimeout(()=>{saveBtnEl.textContent='SAVE';},1800); }
  });

  function lightWord(globalIdx) {
    if (globalIdx>=spans.length) return;
    spans[globalIdx].classList.add('lit'); spans[globalIdx].style.color=getWordColor(globalIdx);
    litCount=Math.max(litCount,globalIdx+1);
    const pct=litCount/words.length*100;
    progressBar.style.width=pct.toFixed(1)+'%';
    wordCount.textContent=`${litCount.toLocaleString()} / ${words.length.toLocaleString()}`;
    checkMilestones(pct);
    if (displayMode==='list') { spans[globalIdx].scrollIntoView({block:'center',behavior:'smooth'}); }
    else { const c=spans[globalIdx]; setTimeout(()=>{if(!c._dispatched)dropWord(c);},3000); }
  }

  // iOS Safari: track last boundary event time to detect stalls
  let lastBoundaryTime = 0;
  let boundaryFired = false;

  function speakSentence(si) {
    if (!running||paused||si>=sentences.length) {
      if (si>=sentences.length) {
        running=false;
        progress.completions++;
        progress.savedLitCount=0;
        saveProgress(progress);
        checkAchievements('runs');
        saveScore(playerName);
      }
      return;
    }
    const s=sentences[si]; const utt=new SpeechSynthesisUtterance(s.text);
    utt.pitch=parseFloat(pitchEl.value); utt.rate=ttsRate();
    const vi=parseInt(voiceSelect.value); if(voices[vi])utt.voice=voices[vi];

    // Estimate ms per character for fallback word timing
    const charsPerSec = 15 * utt.rate;
    let wordFallbackTimer = null;

    function cancelFallback() { if (wordFallbackTimer) { clearTimeout(wordFallbackTimer); wordFallbackTimer = null; } }

    function scheduleFallback(wordIdx, charLen) {
      cancelFallback();
      const ms = Math.max(80, (charLen / charsPerSec) * 1000);
      wordFallbackTimer = setTimeout(() => {
        if (!running || paused) return;
        if (wordIdx < s.end) lightWord(wordIdx);
        // advance to next word via fallback
        const nextW = wordIdx + 1;
        if (nextW < s.end) {
          const nextChar = Object.entries(s.charMap).find(([,v]) => v === nextW);
          scheduleFallback(nextW, nextChar ? words[nextW].length : 4);
        }
      }, ms);
    }

    utt.onboundary=(e)=>{
      if(e.name!=='word') return;
      boundaryFired = true;
      lastBoundaryTime = Date.now();
      cancelFallback();
      const idx=s.charMap[e.charIndex];
      if(idx!==undefined) lightWord(idx);
    };

    utt.onstart=()=>{
      lightWord(s.start);
      speakSentence(si+1);
      // Start fallback timer in case onboundary never fires (iOS Safari)
      if (!boundaryFired) {
        scheduleFallback(s.start + 1, words[s.start] ? words[s.start].length : 4);
      }
    };

    utt.onend=()=>{
      cancelFallback();
      for(let i=s.start;i<s.end;i++){if(!spans[i].classList.contains('lit'))lightWord(i);}
    };

    utt.onerror=()=>{ cancelFallback(); };

    speechSynthesis.speak(utt); sentIdx=si+1;
  }

  // iOS Safari watchdog: speechSynthesis silently stalls, especially after ~30s
  setInterval(() => {
    if (!running || paused) return;
    if (speechSynthesis.speaking && speechSynthesis.paused) {
      speechSynthesis.resume();
    }
    // If synthesis claims to be speaking but no boundary fired recently, nudge it
    if (speechSynthesis.speaking && boundaryFired && Date.now() - lastBoundaryTime > 8000) {
      speechSynthesis.resume();
    }
  }, 5000);

  pauseBtn.addEventListener('click', () => {
    paused=!paused; pauseBtn.textContent=paused?'RESUME':'PAUSE';
    if(paused){speechSynthesis.pause();saveScore(playerName);}
    else{speechSynthesis.resume();}
  });

  // =============================================
  // BEES
  // =============================================
  const beeContainer = document.getElementById('bees');
  let activeBeeCount = 0;
  const TARGET_BEES  = 22;

  function catchBee(bee) {
    if (bee._caught) return; bee._caught=true;
    bee.classList.add('caught');
    beesCollected++;
    progress.beesTotal++;
    progress.beesCaught++;
    saveProgress(progress);
    checkAchievements('bees');
    updateCurrencyDisplay();
    if (shopOpen) renderShop();
    activeBeeCount--;
    setTimeout(() => {
      bee.remove();
      setTimeout(() => { spawnBee(); activeBeeCount++; }, 800+Math.random()*1200);
    }, 300);
  }

  function spawnBee() {
    const bee=document.createElement('img'); bee.src='bee.png'; bee.className='bee';
    const goRight=Math.random()>0.5, size=108+Math.random()*216, topPct=2+Math.random()*88;
    const dur=6+Math.random()*18, delay=-(Math.random()*dur), wob=1.2+Math.random()*1.8;
    bee.style.cssText=`width:${size}px;top:${topPct}vh;animation:${goRight?'fly-right':'fly-left'} ${dur}s ${delay}s linear infinite,wobble ${wob}s ease-in-out infinite;opacity:${0.55+Math.random()*0.45};`;
    bee.addEventListener('click',()=>{ if(!running)return; catchBee(bee); });
    bee.addEventListener('touchstart',(e)=>{ e.preventDefault(); if(!running)return; catchBee(bee); },{passive:false});
    if (running) bee.classList.add('catchable');
    beeContainer.appendChild(bee); activeBeeCount++;
  }

  for (let i=0;i<TARGET_BEES;i++) spawnBee();

  // =============================================
  // TIME TRACKING
  // =============================================
  let saveProgressTick=0;
  setInterval(()=>{
    if (!running||paused) return;
    progress.listeningSeconds++;
    saveProgressTick++;
    if (saveProgressTick>=10) {
      progress.savedLitCount = litCount;
      saveProgress(progress);
      saveProgressTick=0;
    }
    checkAchievements('time');
  },1000);

  // =============================================
  // START / RESUME
  // =============================================

  // Show RESUME button if there's a saved position
  const resumeBtn = document.getElementById('resume-btn');
  if (progress.savedLitCount > 0) resumeBtn.style.display = '';

  async function launchGame(resumeFrom) {
    const primer = new SpeechSynthesisUtterance('');
    speechSynthesis.speak(primer);
    speechSynthesis.cancel();

    playerName = playerNameEl.value.trim() || 'anonymous';
    liveSpeed.value = speedEl.value;
    const res = await fetch(SCRIPT_FILE); if (!res.ok) { alert('Could not load vibes.txt'); return; }
    const text = await res.text();
    words = text.trim().split(/\s+/); wordCount.textContent = `0 / ${words.length.toLocaleString()}`;
    renderAll(); buildSentences(); buildMilestones();
    overlay.style.opacity = '0'; overlay.style.pointerEvents = 'none';
    hud.classList.add('visible'); header.classList.add('visible');
    loadLeaderboard();
    document.querySelectorAll('.bee').forEach(b => b.classList.add('catchable'));
    running = true;
    boundaryFired = false;

    if (resumeFrom > 0) {
      // Light all words up to the saved position without speaking them
      for (let i = 0; i < Math.min(resumeFrom, spans.length); i++) {
        spans[i].classList.add('lit');
        spans[i].style.color = getWordColor(i);
      }
      litCount = resumeFrom;
      const pct = litCount / words.length * 100;
      progressBar.style.width = pct.toFixed(1) + '%';
      wordCount.textContent = `${litCount.toLocaleString()} / ${words.length.toLocaleString()}`;
      // Find which sentence to resume from
      const si = sentences.findIndex(s => s.end > resumeFrom);
      speakSentence(si >= 0 ? si : 0);
    } else {
      speakSentence(0);
    }
  }

  startBtn.addEventListener('click', async () => {
    progress.savedLitCount = 0;
    saveProgress(progress);
    await launchGame(0);
  });

  resumeBtn.addEventListener('click', async () => {
    await launchGame(progress.savedLitCount);
  });

  // initial currency display
  updateCurrencyDisplay();
</script>
</body>
</html>
