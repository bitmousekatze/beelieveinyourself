<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>beelieveInYourself</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
    const CONFIG = {
      JSONBIN_KEY: '$2a$10$koP4muu.a.utvHipMT1WHOyTApRAej0vJ7iEJvEKzyW1zNYFA2mzG',
      JSONBIN_BIN: '6a025b04c0954111d80c6193'
    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #555;
      color: #f5c800;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- header ---- */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: #3a3a3a;
      border-bottom: 1px solid #f5c80033;
      display: none;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 90;
    }
    #header.visible { display: flex; }

    .header-title {
      color: #f5c800;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    #bee-counter {
      color: #f5c800;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      flex: 1;
      white-space: nowrap;
    }

    .header-btn {
      background: transparent;
      border: 1px solid #f5c80066;
      color: #f5c800;
      padding: 4px 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .header-btn:hover { background: #f5c80022; border-color: #f5c800; }
    .header-btn:active { transform: scale(0.96); }

    .mode-btn  { opacity: 0.45; }
    .cmode-btn { opacity: 0.45; }
    .mode-btn.active,
    .cmode-btn.active { opacity: 1; background: #f5c80018; border-color: #f5c800; }

    .header-sep { width: 1px; height: 20px; background: #f5c80044; flex-shrink: 0; }

    /* ---- overlay ---- */
    #overlay {
      position: fixed;
      inset: 0;
      background: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #overlay h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.1em;
      text-align: center;
      text-shadow: 0 0 30px #f5c800aa;
    }

    #overlay p { color: #111; font-size: 1rem; }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 320px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 10px;
      color: #111;
      font-size: 0.85rem;
    }

    .control-row label { min-width: 50px; color: #111; }

    .control-row input[type=range] {
      flex: 1;
      accent-color: #f5c800;
      cursor: pointer;
    }

    .control-row select {
      flex: 1;
      background: #444;
      color: #f5c800;
      border: 1px solid #f5c800;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 4px 6px;
      cursor: pointer;
      outline: none;
    }

    .control-row .val {
      min-width: 30px;
      text-align: right;
      color: #f5c800;
      font-size: 0.8rem;
    }

    #start-btn {
      background: #f5c800;
      color: #0a0a00;
      border: none;
      padding: 16px 48px;
      font-size: 1.4rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 0 20px #f5c80066;
      margin-top: 8px;
    }

    #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #f5c800aa; }
    #start-btn:active { transform: scale(0.97); }

    /* ---- words ---- */
    #words {
      padding: 64px 5vw 200px;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      line-height: 1.9;
      word-spacing: 0.25em;
      max-width: 100%;
    }

    .word {
      display: inline;
      color: #555;
      transition: color 0.08s ease;
    }

    /* ---- floating/bouncing/falling word clones ---- */
    .fly-word {
      font-family: 'Courier New', monospace;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
      line-height: 1;
      transform-origin: center center;
    }

    @keyframes float-up {
      0%   { transform: translateY(0)    scale(1);   opacity: 1; }
      100% { transform: translateY(-50vh) scale(0.7); opacity: 0; }
    }

    /* ---- HUD ---- */
    #hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 24px 16px;
      background: linear-gradient(transparent, #555555dd 40%, #555);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #hud.visible { opacity: 1; pointer-events: all; }

    #pause-btn {
      background: transparent;
      border: 1px solid #f5c800;
      color: #f5c800;
      padding: 6px 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #pause-btn:hover { background: #f5c80022; }

    #hud-speed-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      color: #111;
      font-size: 0.75rem;
    }

    #live-speed { accent-color: #f5c800; width: 100px; cursor: pointer; }

    #progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }

    #progress {
      position: relative;
      height: 6px;
      background: #333;
      border-radius: 3px;
    }

    #progress-bar {
      height: 100%;
      background: #f5c800;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s linear;
    }

    .milestone {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid #333;
      cursor: pointer;
      z-index: 2;
    }
    .milestone.reached { background: #f5c800; border-color: #f5c800; }

    .milestone-label {
      position: absolute;
      bottom: 14px;
      transform: translateX(-50%);
      background: #222;
      color: #f5c800;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      padding: 3px 6px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .milestone:hover .milestone-label,
    .milestone.reached:hover .milestone-label { opacity: 1; }

    #word-count {
      color: #333;
      font-size: 0.75rem;
      min-width: 90px;
      text-align: right;
      flex-shrink: 0;
    }

    #milestone-toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #111;
      color: #f5c800;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 10px 20px;
      border: 1px solid #f5c800;
      border-radius: 4px;
      z-index: 200;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      max-width: 80vw;
    }
    #milestone-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ---- leaderboard ---- */
    #leaderboard {
      width: 320px;
      background: #44444466;
      border: 1px solid #f5c80033;
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 0.75rem;
    }
    #leaderboard h3 {
      color: #f5c800;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      text-align: center;
    }
    .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #ffffff11;
      gap: 6px;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank  { color: #f5c800; min-width: 18px; }
    .lb-name  { color: #ddd; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { color: #f5c800; text-align: right; min-width: 40px; }
    .lb-bees  { color: #f5c800; text-align: right; min-width: 32px; font-size: 0.68rem; }
    .lb-row.me .lb-name, .lb-row.me .lb-score, .lb-row.me .lb-bees { color: #fff; font-weight: bold; }

    /* ---- bees ---- */
    .bee {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      image-rendering: pixelated;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .bee.catchable {
      pointer-events: auto;
      cursor: pointer;
    }
    .bee.caught {
      transform: scale(0) !important;
      opacity: 0 !important;
    }

    @keyframes fly-right {
      from { transform: translateX(-120px) scaleX(1); }
      to   { transform: translateX(calc(100vw + 120px)) scaleX(1); }
    }
    @keyframes fly-left {
      from { transform: translateX(calc(100vw + 120px)) scaleX(-1); }
      to   { transform: translateX(-120px) scaleX(-1); }
    }
    @keyframes wobble {
      0%,100% { margin-top: 0; }
      50%      { margin-top: 18px; }
    }
  </style>
</head>
<body>

<!-- header — visible only during gameplay -->
<div id="header">
  <span class="header-title">🐝 beelieveInYourself</span>
  <span id="bee-counter">  collected: 0</span>
  <button class="header-btn" id="save-btn">SAVE</button>
  <div class="header-sep"></div>
  <button class="header-btn mode-btn active" id="mode-list">LIST</button>
  <button class="header-btn mode-btn"        id="mode-fall">FALL</button>
  <button class="header-btn mode-btn"        id="mode-float">FLOAT</button>
  <button class="header-btn mode-btn"        id="mode-bounce">BOUNCE</button>
  <div class="header-sep"></div>
  <button class="header-btn cmode-btn active" id="cmode-bee">BEE</button>
  <button class="header-btn cmode-btn"        id="cmode-rainbow">RAINBOW</button>
  <button class="header-btn cmode-btn"        id="cmode-matrix">MATRIX</button>
  <button class="header-btn cmode-btn"        id="cmode-chaos">CHAOS</button>
</div>

<div id="overlay">
  <h1>🐝 beelieveInYourself</h1>
  <p>according to all known laws of aviation...</p>
  <div class="controls">
    <div class="control-row">
      <label>name</label>
      <input type="text" id="player-name" maxlength="20" placeholder="enter your name"
        style="flex:1; background:#444; color:#f5c800; border:1px solid #f5c800;
               font-family:'Courier New',monospace; font-size:0.85rem; padding:4px 8px; outline:none;" />
    </div>
    <div class="control-row">
      <label>speed</label>
      <input type="range" id="speed" min="1" max="38" value="12" />
      <span class="val" id="speed-val">12</span>
    </div>
    <div class="control-row">
      <label>pitch</label>
      <input type="range" id="pitch" min="0.1" max="2" step="0.05" value="1" />
      <span class="val" id="pitch-val">1.00</span>
    </div>
    <div class="control-row">
      <label>voice</label>
      <select id="voice-select"><option>loading voices...</option></select>
    </div>
    <button id="start-btn">START</button>
    <a href="beelieve.html" style="color:#111; font-size:0.75rem; letter-spacing:0.1em; text-decoration:none; margin-top:4px;">how was this made? →</a>

    <div id="leaderboard">
      <h3>🏆 leaderboard</h3>
      <div id="lb-rows"><div style="color:#666;text-align:center;padding:8px">loading...</div></div>
    </div>
  </div>
</div>

<div id="bees"></div>
<div id="words"></div>
<div id="milestone-toast"></div>

<div id="hud">
  <button id="pause-btn">PAUSE</button>
  <div id="hud-speed-wrap">
    <span>spd</span>
    <input type="range" id="live-speed" min="1" max="38" value="12" />
  </div>
  <div id="progress-wrap">
    <div id="progress">
      <div id="progress-bar"></div>
    </div>
  </div>
  <span id="word-count">0 / 0</span>
</div>

<script>
  const SCRIPT_FILE = 'vibes.txt';

  const MILESTONES = [
    { pct:  0.5, icon: '🐝', label: 'Yellow, black. Yellow, black.' },
    { pct:  3.3, icon: '🎓', label: 'Graduation Day' },
    { pct:  7.6, icon: '🌻', label: 'Pollen Jocks!' },
    { pct: 23.9, icon: '🌸', label: 'She saved my life' },
    { pct: 24.6, icon: '🎷', label: 'You like jazz?' },
    { pct: 34.1, icon: '🧠', label: 'Thinking bee!' },
    { pct: 41.1, icon: '🍯', label: 'Honey Farms discovered' },
    { pct: 54.6, icon: '⚖️',  label: 'The trial begins' },
    { pct: 58.9, icon: '🎤', label: 'Mr. Sting takes the stand' },
    { pct: 74.4, icon: '✊', label: 'FREE THE BEES!' },
    { pct: 74.6, icon: '🏆', label: 'The bees win!' },
    { pct: 79.5, icon: '🌺', label: 'Flowers are dying...' },
    { pct: 88.9, icon: '✈️',  label: 'Barry flies the plane' },
    { pct: 95.7, icon: '🛬', label: 'Barry, we did it!' },
    { pct: 100,  icon: '🎬', label: 'No rehearsal for that.' },
  ];

  // --- element refs ---
  const lbRows        = document.getElementById('lb-rows');
  const playerNameEl  = document.getElementById('player-name');
  const overlay       = document.getElementById('overlay');
  const wordsEl       = document.getElementById('words');
  const hud           = document.getElementById('hud');
  const header        = document.getElementById('header');
  const pauseBtn      = document.getElementById('pause-btn');
  const speedEl       = document.getElementById('speed');
  const speedVal      = document.getElementById('speed-val');
  const pitchEl       = document.getElementById('pitch');
  const pitchVal      = document.getElementById('pitch-val');
  const voiceSelect   = document.getElementById('voice-select');
  const liveSpeed     = document.getElementById('live-speed');
  const progressBar   = document.getElementById('progress-bar');
  const progressEl    = document.getElementById('progress');
  const wordCount     = document.getElementById('word-count');
  const startBtn      = document.getElementById('start-btn');
  const toast         = document.getElementById('milestone-toast');
  const saveBtnEl     = document.getElementById('save-btn');
  const beeCounterEl  = document.getElementById('bee-counter');

  let playerName    = 'anonymous';
  let scoreSaved    = false;
  let beesCollected = 0;

  // --- leaderboard ---
  const BIN_URL = `https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN}`;
  const BIN_HEADERS = { 'X-Master-Key': CONFIG.JSONBIN_KEY, 'Content-Type': 'application/json' };

  async function fetchScores() {
    try {
      const res  = await fetch(BIN_URL, { headers: { 'X-Master-Key': CONFIG.JSONBIN_KEY } });
      const data = await res.json();
      return data.record.scores || [];
    } catch { return []; }
  }

  async function saveScore(name, score) {
    if (scoreSaved || score < 10) return;
    scoreSaved = true;
    let scores = await fetchScores();
    const existing = scores.find(s => s.name === name);
    if (existing && existing.score >= score) return;
    scores = scores.filter(s => s.name !== name);
    scores.push({ name, score, bees: beesCollected, date: new Date().toISOString().slice(0, 10) });
    scores.sort((a, b) => b.score - a.score);
    const top50 = scores.slice(0, 50);
    try {
      await fetch(BIN_URL, {
        method: 'PUT', headers: BIN_HEADERS,
        body: JSON.stringify({ scores: top50 }),
        keepalive: true
      });
      renderLeaderboard(top50, name);
    } catch {}
  }

  function renderLeaderboard(scores, highlightName) {
    lbRows.innerHTML = '';
    const top10 = scores.slice(0, 10);
    top10.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row' + (s.name === highlightName ? ' me' : '');
      row.innerHTML = `
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.score.toLocaleString()}</span>
        <span class="lb-bees">🐝${s.bees || 0}</span>
      `;
      lbRows.appendChild(row);
    });
    if (!top10.length) lbRows.innerHTML = '<div style="color:#666;text-align:center;padding:8px">no scores yet</div>';
  }

  async function loadLeaderboard() {
    const scores = await fetchScores();
    renderLeaderboard(scores, playerName);
  }

  loadLeaderboard();

  window.addEventListener('beforeunload', () => {
    if (running || litCount > 0) saveScore(playerName, litCount);
  });

  let words         = [];
  let spans         = [];
  let sentences     = [];
  let sentIdx       = 0;
  let litCount      = 0;
  let paused        = false;
  let running       = false;
  let toastTimer    = null;
  let nextMilestone = 0;
  let voices        = [];

  // --- voices ---
  function loadVoices() {
    const all = speechSynthesis.getVoices();
    voices = all.filter(v => v.lang.startsWith('en'));
    voiceSelect.innerHTML = '';
    if (!voices.length) { voiceSelect.innerHTML = '<option>no voices found</option>'; return; }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.default || v.lang === 'en-US') opt.selected = true;
      voiceSelect.appendChild(opt);
    });
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  let voiceRetries = 0;
  const voiceRetryTimer = setInterval(() => {
    if (voices.length || voiceRetries++ > 10) { clearInterval(voiceRetryTimer); return; }
    loadVoices();
  }, 300);

  function ttsRate() { return 0.5 + (+liveSpeed.value - 1) / 37 * 1.5; }

  speedEl.addEventListener('input', () => { speedVal.textContent = speedEl.value; });
  pitchEl.addEventListener('input', () => { pitchVal.textContent = parseFloat(pitchEl.value).toFixed(2); });

  // --- toast ---
  function showToast(text) {
    clearTimeout(toastTimer);
    toast.textContent = text;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // --- milestones ---
  function buildMilestones() {
    MILESTONES.forEach((m, i) => {
      const dot = document.createElement('div');
      dot.className = 'milestone';
      dot.id = `ms-${i}`;
      dot.style.left = m.pct + '%';
      const lbl = document.createElement('div');
      lbl.className = 'milestone-label';
      lbl.textContent = `${m.icon} ${m.label}`;
      dot.appendChild(lbl);
      progressEl.appendChild(dot);
    });
  }

  function checkMilestones(pct) {
    while (nextMilestone < MILESTONES.length && pct >= MILESTONES[nextMilestone].pct) {
      const m = MILESTONES[nextMilestone];
      document.getElementById(`ms-${nextMilestone}`)?.classList.add('reached');
      showToast(`${m.icon} ${m.label}`);
      nextMilestone++;
    }
  }

  // --- pre-render ---
  function renderAll() {
    words.forEach(w => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w + ' ';
      wordsEl.appendChild(span);
      spans.push(span);
    });
  }

  // --- build sentences ---
  function buildSentences() {
    const end = /[.!?]$/;
    let start = 0;
    for (let i = 0; i < words.length; i++) {
      if (end.test(words[i]) || i === words.length - 1) {
        const slice = words.slice(start, i + 1);
        const charMap = [];
        let pos = 0;
        slice.forEach((w, wi) => {
          for (let c = 0; c < w.length; c++) charMap[pos + c] = start + wi;
          pos += w.length + 1;
        });
        sentences.push({ start, end: i + 1, text: slice.join(' '), charMap });
        start = i + 1;
      }
    }
  }

  // =============================================
  // DISPLAY MODES
  // =============================================
  let displayMode = 'list';

  // shared state — declared before masterRAF so the IIFE can reference them
  let bouncingWords = [];
  let fallBodies    = [];

  // master RAF — syncs fall DOM + runs bounce physics
  (function masterRAF() {
    requestAnimationFrame(masterRAF);
    // fall: sync DOM to Matter.js bodies
    fallBodies.forEach(({ body, el }) => {
      el.style.left      = (body.position.x - el.offsetWidth  / 2) + 'px';
      el.style.top       = (body.position.y - el.offsetHeight / 2) + 'px';
      el.style.transform = `rotate(${body.angle}rad)`;
    });
    // bounce: simple viewport physics
    bouncingWords.forEach(bw => {
      bw.x += bw.vx;
      bw.y += bw.vy;
      const w = bw.el.offsetWidth;
      const h = bw.el.offsetHeight;
      if (bw.x < 0)                        { bw.x = 0;                        bw.vx =  Math.abs(bw.vx); }
      if (bw.x + w > window.innerWidth)    { bw.x = window.innerWidth - w;    bw.vx = -Math.abs(bw.vx); }
      if (bw.y < 44)                       { bw.y = 44;                       bw.vy =  Math.abs(bw.vy); }
      if (bw.y + h > window.innerHeight)   { bw.y = window.innerHeight - h;   bw.vy = -Math.abs(bw.vy); }
      bw.el.style.left = bw.x + 'px';
      bw.el.style.top  = bw.y + 'px';
    });
  })();

  // --- FALL (Matter.js, document-space) ---
  let fallEngine = null;
  let fallWorld  = null;
  let fallInited = false;
  let fallGround = null;
  let fallLeft   = null;
  let fallRight  = null;
  let fallFloorY = 0;

  function viewportBottom() { return window.scrollY + window.innerHeight - 50; }

  function initFall() {
    if (fallInited) return;
    fallInited = true;
    fallFloorY = viewportBottom();

    fallEngine = Matter.Engine.create();
    fallWorld  = fallEngine.world;
    fallEngine.gravity.y = 1.2;

    fallGround = Matter.Bodies.rectangle(window.innerWidth / 2, fallFloorY + 30, window.innerWidth * 4, 60, { isStatic: true });
    fallLeft   = Matter.Bodies.rectangle(-30, fallFloorY / 2, 60, fallFloorY * 2, { isStatic: true });
    fallRight  = Matter.Bodies.rectangle(window.innerWidth + 30, fallFloorY / 2, 60, fallFloorY * 2, { isStatic: true });
    Matter.World.add(fallWorld, [fallGround, fallLeft, fallRight]);

    // only move ground DOWN (scrolling up never destroys the pile)
    window.addEventListener('scroll', () => {
      const ny = viewportBottom();
      if (ny <= fallFloorY) return;
      fallFloorY = ny;
      Matter.Body.setPosition(fallGround, { x: window.innerWidth / 2, y: fallFloorY + 30 });
      Matter.Body.setPosition(fallLeft,   { x: -30,                    y: fallFloorY / 2  });
      Matter.Body.setPosition(fallRight,  { x: window.innerWidth + 30, y: fallFloorY / 2  });
    });

    setInterval(() => Matter.Engine.update(fallEngine, 1000 / 60), 1000 / 60);
  }

  function dropFall(span) {
    if (span._dispatched) return;
    span._dispatched = true;
    initFall();

    const rect  = span.getBoundingClientRect();
    const docX  = rect.left + rect.width  / 2 + window.scrollX;
    const docY  = rect.top  + rect.height / 2 + window.scrollY;
    const startY = Math.min(docY, fallFloorY - 20);

    const el = document.createElement('span');
    el.className   = 'fly-word';
    el.style.position = 'absolute';
    el.style.left  = '-9999px';
    el.style.top   = '-9999px';
    el.textContent = span.textContent.trim();
    el.style.color = span.style.color || '#f5c800';
    document.body.appendChild(el);

    const w = Math.max(el.offsetWidth,  10) + 6;
    const h = Math.max(el.offsetHeight, 10) + 6;

    const body = Matter.Bodies.rectangle(docX, startY, w, h, {
      restitution: 0.4, friction: 0.3, frictionAir: 0.012,
      angle: (Math.random() - 0.5) * 0.4,
    });
    Matter.Body.setVelocity(body, { x: (Math.random() - 0.5) * 4, y: 2 + Math.random() * 2 });
    Matter.World.add(fallWorld, body);
    fallBodies.push({ body, el, span });
    span.style.visibility = 'hidden';
  }

  // --- FLOAT (CSS animation, viewport-space) ---
  function dropFloat(span) {
    if (span._dispatched) return;
    span._dispatched = true;

    const rect = span.getBoundingClientRect();
    const el   = document.createElement('span');
    el.className   = 'fly-word';
    el.style.position = 'fixed';
    el.style.left  = rect.left + 'px';
    el.style.top   = rect.top  + 'px';
    el.style.color = span.style.color || '#f5c800';
    el.style.animation = `float-up ${2 + Math.random()}s ease-in forwards`;
    el.textContent = span.textContent.trim();
    document.body.appendChild(el);
    span.style.visibility = 'hidden';
    setTimeout(() => el.remove(), 3200);
  }

  // --- BOUNCE (simple viewport physics) ---
  function dropBounce(span) {
    if (span._dispatched) return;
    span._dispatched = true;

    const rect  = span.getBoundingClientRect();
    const el    = document.createElement('span');
    el.className   = 'fly-word';
    el.style.position = 'fixed';
    el.style.left  = rect.left + 'px';
    el.style.top   = rect.top  + 'px';
    el.style.color = span.style.color || '#f5c800';
    el.textContent = span.textContent.trim();
    document.body.appendChild(el);
    span.style.visibility = 'hidden';

    const speed = 2.5 + Math.random() * 4;
    const angle = Math.random() * Math.PI * 2;
    bouncingWords.push({
      el,
      x: rect.left,
      y: rect.top,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
    });
  }

  // --- dispatch to correct mode ---
  function dropWord(span) {
    if (displayMode === 'fall')   dropFall(span);
    else if (displayMode === 'float')  dropFloat(span);
    else if (displayMode === 'bounce') dropBounce(span);
  }

  function dropAllLit() {
    spans.forEach(span => {
      if (span.classList.contains('lit') && !span._dispatched) dropWord(span);
    });
  }

  // --- mode buttons ---
  const modeBtns = document.querySelectorAll('.mode-btn');
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      displayMode = btn.id.replace('mode-', '');
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (displayMode !== 'list' && running) dropAllLit();
    });
  });

  // --- color modes ---
  let colorMode = 'bee';
  const RAINBOW_COLORS = ['#ff3333','#ff8800','#ffee00','#33dd55','#3399ff','#aa44ff','#ff44cc'];

  function getWordColor(i) {
    switch (colorMode) {
      case 'rainbow': return RAINBOW_COLORS[i % RAINBOW_COLORS.length];
      case 'matrix':  return `hsl(120,100%,${35 + (i % 6) * 6}%)`;
      case 'chaos':   return `hsl(${Math.round(i * 137.508) % 360},90%,62%)`;
      default:        return i % 2 === 0 ? '#f5c800' : '#111111';
    }
  }

  const cmodeButtons = document.querySelectorAll('.cmode-btn');
  cmodeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      colorMode = btn.id.replace('cmode-', '');
      cmodeButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      spans.forEach((span, i) => {
        if (span.classList.contains('lit')) span.style.color = getWordColor(i);
      });
    });
  });

  // --- save button ---
  saveBtnEl.addEventListener('click', () => {
    if (litCount > 0) {
      scoreSaved = false;
      saveScore(playerName, litCount);
      saveBtnEl.textContent = 'SAVED!';
      setTimeout(() => { saveBtnEl.textContent = 'SAVE'; }, 1800);
    }
  });

  // --- light up a word ---
  function lightWord(globalIdx) {
    if (globalIdx >= spans.length) return;
    spans[globalIdx].classList.add('lit');
    spans[globalIdx].style.color = getWordColor(globalIdx);
    litCount = Math.max(litCount, globalIdx + 1);

    const pct = litCount / words.length * 100;
    progressBar.style.width = pct.toFixed(1) + '%';
    wordCount.textContent   = `${litCount.toLocaleString()} / ${words.length.toLocaleString()}`;
    checkMilestones(pct);

    if (displayMode === 'list') {
      spans[globalIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    } else {
      const captured = spans[globalIdx];
      setTimeout(() => {
        if (!captured._dispatched) dropWord(captured);
      }, 3000);
    }
  }

  // --- speak a sentence ---
  function speakSentence(si) {
    if (!running || paused || si >= sentences.length) {
      if (si >= sentences.length) { running = false; saveScore(playerName, litCount); }
      return;
    }

    const s   = sentences[si];
    const utt = new SpeechSynthesisUtterance(s.text);
    utt.pitch = parseFloat(pitchEl.value);
    utt.rate  = ttsRate();
    const vi  = parseInt(voiceSelect.value);
    if (voices[vi]) utt.voice = voices[vi];

    utt.onboundary = (e) => {
      if (e.name !== 'word') return;
      const idx = s.charMap[e.charIndex];
      if (idx !== undefined) lightWord(idx);
    };

    utt.onstart = () => { lightWord(s.start); speakSentence(si + 1); };

    utt.onend = () => {
      for (let i = s.start; i < s.end; i++) {
        if (!spans[i].classList.contains('lit')) lightWord(i);
      }
    };

    speechSynthesis.speak(utt);
    sentIdx = si + 1;
  }

  // --- pause / resume ---
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    if (paused) {
      speechSynthesis.pause();
      if (litCount > 0) saveScore(playerName, litCount);
    } else {
      scoreSaved = false;
      speechSynthesis.resume();
    }
  });

  // --- bees ---
  (function spawnBees() {
    const container = document.getElementById('bees');
    for (let i = 0; i < 22; i++) {
      const bee      = document.createElement('img');
      bee.src        = 'bee.png';
      bee.className  = 'bee';
      const goRight  = Math.random() > 0.5;
      const size     = 108 + Math.random() * 216;
      const topPct   = 2 + Math.random() * 88;
      const dur      = 6 + Math.random() * 18;
      const delay    = -(Math.random() * dur);
      const wob      = 1.2 + Math.random() * 1.8;

      bee.style.cssText = `
        width: ${size}px; top: ${topPct}vh;
        animation:
          ${goRight ? 'fly-right' : 'fly-left'} ${dur}s ${delay}s linear infinite,
          wobble ${wob}s ease-in-out infinite;
        opacity: ${0.55 + Math.random() * 0.45};
      `;

      bee.addEventListener('click', () => {
        if (!running) return;
        bee.classList.add('caught');
        beesCollected++;
        beeCounterEl.textContent = `  collected: ${beesCollected}`;
        setTimeout(() => bee.remove(), 300);
      });

      container.appendChild(bee);
    }
  })();

  // --- start ---
  startBtn.addEventListener('click', async () => {
    playerName = playerNameEl.value.trim() || 'anonymous';
    liveSpeed.value = speedEl.value;

    const res = await fetch(SCRIPT_FILE);
    if (!res.ok) { alert('Could not load vibes.txt'); return; }
    const text = await res.text();

    words = text.trim().split(/\s+/);
    wordCount.textContent = `0 / ${words.length.toLocaleString()}`;

    renderAll();
    buildSentences();
    buildMilestones();

    overlay.style.opacity     = '0';
    overlay.style.pointerEvents = 'none';
    hud.classList.add('visible');
    header.classList.add('visible');
    loadLeaderboard();

    // make bees catchable
    document.querySelectorAll('.bee').forEach(b => b.classList.add('catchable'));

    running = true;
    speakSentence(0);
  });
</script>
</body>
