    #overlay h1 {

    #start-btn {

  </style>

<script>
  const SCRIPT_FILE = 'vibes.txt';

  const MILESTONES = [
    { pct:  0.5, icon: '🐝', label: 'Yellow, black. Yellow, black.' },
    { pct:  3.3, icon: '🎓', label: 'Graduation Day' },
    { pct:  7.6, icon: '🌻', label: 'Pollen Jocks!' },
    { pct: 23.9, icon: '🌸', label: 'She saved my life' },
    { pct: 24.6, icon: '🎷', label: 'You like jazz?' },
    { pct: 34.1, icon: '🧠', label: 'Thinking bee!' },
    { pct: 41.1, icon: '🍯', label: 'Honey Farms discovered' },
    { pct: 54.6, icon: '⚖️',  label: 'The trial begins' },
    { pct: 58.9, icon: '🎤', label: 'Mr. Sting takes the stand' },
    { pct: 74.4, icon: '✊', label: 'FREE THE BEES!' },
    { pct: 74.6, icon: '🏆', label: 'The bees win!' },
    { pct: 79.5, icon: '🌺', label: 'Flowers are dying...' },
    { pct: 88.9, icon: '✈️',  label: 'Barry flies the plane' },
    { pct: 95.7, icon: '🛬', label: 'Barry, we did it!' },
    { pct: 100,  icon: '🎬', label: 'No rehearsal for that.' },
  ];

  // =============================================
  // ACHIEVEMENTS
  // =============================================
  const ACHIEVEMENTS = [
    // --- bee catching ---
    { id: 'bee_1',       cat: 'bees', threshold: 1,        icon: '🐝', name: 'First Sting',           desc: "You caught your first bee. They said it couldn't be done." },
    { id: 'bee_50',      cat: 'bees', threshold: 50,       icon: '🫙', name: 'Amateur Beekeeper',      desc: "50 bees. You're getting the hang of this." },
    { id: 'bee_100',     cat: 'bees', threshold: 100,      icon: '🍯', name: 'Hive Thief',             desc: "100 bees caught. The colony is getting suspicious." },
    { id: 'bee_1000',    cat: 'bees', threshold: 1000,     icon: '🦺', name: 'Bee Wrangler',           desc: "1,000 bees. You have a problem and you know it." },
    { id: 'bee_10000',   cat: 'bees', threshold: 10000,    icon: '🚔', name: 'Bee Criminal',           desc: "10,000 bees. Interpol has been notified." },
    { id: 'bee_50000',   cat: 'bees', threshold: 50000,    icon: '⚡', name: 'Bee God',                desc: "50,000 bees. You are beyond mortal comprehension." },
    { id: 'bee_100000',  cat: 'bees', threshold: 100000,   icon: '👑', name: 'Bee Yourself',           desc: "100,000 bees. A fitting end to your journey." },
    { id: 'bee_1000000', cat: 'bees', threshold: 1000000,  icon: '🎬', name: 'Bee Movie',              desc: "1,000,000 bees. According to all known laws of aviation..." },
    // --- time listening ---
    { id: 'time_1m',     cat: 'time', threshold: 60,       icon: '⏱️', name: 'Still Here?',            desc: "1 minute of listening. This is fine." },
    { id: 'time_10m',    cat: 'time', threshold: 600,      icon: '🎧', name: 'Barry Fan',              desc: "10 minutes. You are genuinely invested in this." },
    { id: 'time_1h',     cat: 'time', threshold: 3600,     icon: '🌻', name: "That's Honey Time",      desc: "1 hour of Bee Movie. Please consider going outside." },
    { id: 'time_10h',    cat: 'time', threshold: 36000,    icon: '💃', name: 'Waggle Dancer',          desc: "10 hours. Your friends are starting to worry." },
    { id: 'time_24h',    cat: 'time', threshold: 86400,    icon: '🌍', name: 'One Full Rotation',      desc: "24 hours. You have experienced a full Earth rotation of Bee Movie." },
    { id: 'time_72h',    cat: 'time', threshold: 259200,   icon: '😵', name: 'Sleep Is for the Weak',  desc: "72 hours. Three days. Are you doing okay in there?" },
    { id: 'time_1week',  cat: 'time', threshold: 604800,   icon: '🧘', name: 'The Bee Whisperer',      desc: "One full week. You have transcended. Barry is proud of you." },
  ];

  const PROGRESS_KEY = 'beelieve_progress';

  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); }
    catch { return {}; }
  }

  function saveProgress(p) {
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
  }

  // persistent totals across sessions
  let progress = loadProgress();
  if (!progress.beesTotal)       progress.beesTotal = 0;
  if (!progress.listeningSeconds) progress.listeningSeconds = 0;
  if (!progress.unlocked)        progress.unlocked = {};

  let achToastTimer = null;

  function showAchToast(ach) {
    const el   = document.getElementById('ach-toast');
    document.getElementById('ach-toast-icon').textContent = ach.icon;
    document.getElementById('ach-toast-name').textContent = `UNLOCKED: ${ach.name}`;
    document.getElementById('ach-toast-desc').textContent = ach.desc;
    el.classList.add('show');
    clearTimeout(achToastTimer);
    achToastTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

  function checkAchievements(type) {
    const val = type === 'bees' ? progress.beesTotal : progress.listeningSeconds;
    ACHIEVEMENTS.filter(a => a.cat === type).forEach(ach => {
      if (!progress.unlocked[ach.id] && val >= ach.threshold) {
        progress.unlocked[ach.id] = new Date().toISOString().slice(0, 10);
        saveProgress(progress);
        showAchToast(ach);
      }
    });
  }

  function renderAchievements() {
    const content  = document.getElementById('ach-content');
    const subtitle = document.getElementById('ach-subtitle');
    const total    = ACHIEVEMENTS.length;
    const unlocked = Object.keys(progress.unlocked).length;
    subtitle.textContent = `${unlocked} / ${total} unlocked  ·  🐝 ${progress.beesTotal.toLocaleString()} total  ·  ⏱ ${formatTime(progress.listeningSeconds)} listened`;

    content.innerHTML = '';

    ['bees', 'time'].forEach(cat => {
      const title = document.createElement('div');
      title.className = 'ach-section-title';
      title.textContent = cat === 'bees' ? '🐝 Bee Catching' : '⏱ Time Listening';
      content.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'ach-grid';

      ACHIEVEMENTS.filter(a => a.cat === cat).forEach(ach => {
        const date     = progress.unlocked[ach.id];
        const card     = document.createElement('div');
        card.className = 'ach-card' + (date ? ' unlocked' : '');

        const pct = cat === 'bees'
          ? Math.min(100, (progress.beesTotal / ach.threshold) * 100)
          : Math.min(100, (progress.listeningSeconds / ach.threshold) * 100);

        card.innerHTML = `
          <div class="ach-card-icon">${date ? ach.icon : '🔒'}</div>
          <div class="ach-card-name">${ach.name}</div>
          <div class="ach-card-desc">${ach.desc}</div>
          ${date ? `<div class="ach-card-date">unlocked ${date}</div>` : `
            <div class="ach-progress-bar">
              <div class="ach-progress-fill" style="width:${pct.toFixed(1)}%"></div>
            </div>`}
        `;
        grid.appendChild(card);
      });

      content.appendChild(grid);
    });
  }

  function formatTime(s) {
    if (s < 60)   return `${s}s`;
    if (s < 3600) return `${Math.floor(s/60)}m`;
    return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
  }

  // achievements modal open/close
  function openAch() { renderAchievements(); document.getElementById('ach-overlay').classList.add('open'); }
  function closeAch() { document.getElementById('ach-overlay').classList.remove('open'); }

  document.getElementById('landing-ach-btn').addEventListener('click', openAch);
  document.getElementById('header-ach-btn').addEventListener('click', openAch);
  document.getElementById('ach-close').addEventListener('click', closeAch);
  document.getElementById('ach-overlay').addEventListener('click', e => { if (e.target.id === 'ach-overlay') closeAch(); });

  // =============================================
  // ELEMENT REFS
  // =============================================
  const lbRows        = document.getElementById('lb-rows');
  const playerNameEl  = document.getElementById('player-name');
  const overlay       = document.getElementById('overlay');
  const wordsEl       = document.getElementById('words');
  const hud           = document.getElementById('hud');
  const header        = document.getElementById('header');
  const pauseBtn      = document.getElementById('pause-btn');
  const speedEl       = document.getElementById('speed');
  const speedVal      = document.getElementById('speed-val');
  const pitchEl       = document.getElementById('pitch');
  const pitchVal      = document.getElementById('pitch-val');
  const voiceSelect   = document.getElementById('voice-select');
  const liveSpeed     = document.getElementById('live-speed');
  const progressBar   = document.getElementById('progress-bar');
  const progressEl    = document.getElementById('progress');
  const wordCount     = document.getElementById('word-count');
  const startBtn      = document.getElementById('start-btn');
  const toast         = document.getElementById('milestone-toast');
  const saveBtnEl     = document.getElementById('save-btn');
  const beeCounterEl  = document.getElementById('bee-counter');

  let playerName    = 'anonymous';
  let scoreSaved    = false;
  let beesCollected = 0; // this session only (for leaderboard)

  // =============================================
  // LEADERBOARD
  // =============================================
  const BIN_URL     = `https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN}`;
  const BIN_HEADERS = { 'X-Master-Key': CONFIG.JSONBIN_KEY, 'Content-Type': 'application/json' };

  async function fetchScores() {
    try {
      const res  = await fetch(BIN_URL, { headers: { 'X-Master-Key': CONFIG.JSONBIN_KEY } });
      const data = await res.json();
      return data.record.scores || [];
    } catch { return []; }
  }

  async function saveScore(name, score) {
    if (scoreSaved || score < 10) return;
    scoreSaved = true;
    let scores = await fetchScores();
    const existing = scores.find(s => s.name === name);
    if (existing && existing.score >= score) return;
    scores = scores.filter(s => s.name !== name);
    scores.push({ name, score, bees: beesCollected, date: new Date().toISOString().slice(0, 10) });
    scores.sort((a, b) => b.score - a.score);
    const top50 = scores.slice(0, 50);
    try {
      await fetch(BIN_URL, {
        method: 'PUT', headers: BIN_HEADERS,
        body: JSON.stringify({ scores: top50 }), keepalive: true
      });
      renderLeaderboard(top50, name);
    } catch {}
  }

  function renderLeaderboard(scores, highlightName) {
    lbRows.innerHTML = '';
    const top10 = scores.slice(0, 10);
    top10.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row' + (s.name === highlightName ? ' me' : '');
      row.innerHTML = `
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.score.toLocaleString()}</span>
        <span class="lb-bees">🐝${s.bees || 0}</span>
      `;
      lbRows.appendChild(row);
    });
    if (!top10.length) lbRows.innerHTML = '<div style="color:#666;text-align:center;padding:8px">no scores yet</div>';
  }

  async function loadLeaderboard() {
    const scores = await fetchScores();
    renderLeaderboard(scores, playerName);
  }

  loadLeaderboard();
  window.addEventListener('beforeunload', () => {
    if (running || litCount > 0) saveScore(playerName, litCount);
  });

  // =============================================
  // GAME STATE
  // =============================================
  let words         = [];
  let spans         = [];
  let sentences     = [];
  let sentIdx       = 0;
  let litCount      = 0;
  let paused        = false;
  let running       = false;
  let toastTimer    = null;
  let nextMilestone = 0;
  let voices        = [];

  // --- voices ---
  function loadVoices() {
    const all = speechSynthesis.getVoices();
    voices = all.filter(v => v.lang.startsWith('en'));
    voiceSelect.innerHTML = '';
    if (!voices.length) { voiceSelect.innerHTML = '<option>no voices found</option>'; return; }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.default || v.lang === 'en-US') opt.selected = true;
      voiceSelect.appendChild(opt);
    });
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  let voiceRetries = 0;
  const voiceRetryTimer = setInterval(() => {
    if (voices.length || voiceRetries++ > 10) { clearInterval(voiceRetryTimer); return; }
    loadVoices();
  }, 300);

  function ttsRate() { return 0.5 + (+liveSpeed.value - 1) / 37 * 1.5; }

  speedEl.addEventListener('input', () => { speedVal.textContent = speedEl.value; });
  pitchEl.addEventListener('input', () => { pitchVal.textContent = parseFloat(pitchEl.value).toFixed(2); });

  // --- toast ---
  function showToast(text) {
    clearTimeout(toastTimer);
    toast.textContent = text;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // --- milestones ---
  function buildMilestones() {
    MILESTONES.forEach((m, i) => {
      const dot = document.createElement('div');
      dot.className = 'milestone'; dot.id = `ms-${i}`; dot.style.left = m.pct + '%';
      const lbl = document.createElement('div');
      lbl.className = 'milestone-label';
      lbl.textContent = `${m.icon} ${m.label}`;
      dot.appendChild(lbl);
      progressEl.appendChild(dot);
    });
  }

  function checkMilestones(pct) {
    while (nextMilestone < MILESTONES.length && pct >= MILESTONES[nextMilestone].pct) {
      const m = MILESTONES[nextMilestone];
      document.getElementById(`ms-${nextMilestone}`)?.classList.add('reached');
      showToast(`${m.icon} ${m.label}`);
      nextMilestone++;
    }
  }

  // --- pre-render / sentences ---
  function renderAll() {
    words.forEach(w => {
      const span = document.createElement('span');
      span.className = 'word'; span.textContent = w + ' ';
      wordsEl.appendChild(span); spans.push(span);
    });
  }

  function buildSentences() {
    const end = /[.!?]$/; let start = 0;
    for (let i = 0; i < words.length; i++) {
      if (end.test(words[i]) || i === words.length - 1) {
        const slice = words.slice(start, i + 1);
        const charMap = []; let pos = 0;
        slice.forEach((w, wi) => {
          for (let c = 0; c < w.length; c++) charMap[pos + c] = start + wi;
          pos += w.length + 1;
        });
        sentences.push({ start, end: i + 1, text: slice.join(' '), charMap });
        start = i + 1;
      }
    }
  }

  // =============================================
  // DISPLAY MODES
  // =============================================
  let displayMode = 'list';

  // declared before masterRAF IIFE to avoid TDZ errors
  let bouncingWords = [];
  let fallBodies    = [];

  (function masterRAF() {
    requestAnimationFrame(masterRAF);
    fallBodies.forEach(({ body, el }) => {
      el.style.left      = (body.position.x - el.offsetWidth  / 2) + 'px';
      el.style.top       = (body.position.y - el.offsetHeight / 2) + 'px';
      el.style.transform = `rotate(${body.angle}rad)`;
    });
    bouncingWords.forEach(bw => {
      bw.x += bw.vx; bw.y += bw.vy;
      const w = bw.el.offsetWidth, h = bw.el.offsetHeight;
      if (bw.x < 0)                      { bw.x = 0;                      bw.vx =  Math.abs(bw.vx); }
      if (bw.x + w > window.innerWidth)  { bw.x = window.innerWidth - w;  bw.vx = -Math.abs(bw.vx); }
      if (bw.y < 44)                     { bw.y = 44;                     bw.vy =  Math.abs(bw.vy); }
      if (bw.y + h > window.innerHeight) { bw.y = window.innerHeight - h; bw.vy = -Math.abs(bw.vy); }
      bw.el.style.left = bw.x + 'px'; bw.el.style.top = bw.y + 'px';
    });
  })();

  // --- FALL ---
  let fallEngine = null, fallWorld = null, fallInited = false;
  let fallGround = null, fallLeft = null, fallRight = null, fallFloorY = 0;

  function viewportBottom() { return window.scrollY + window.innerHeight - 50; }

  function initFall() {
    if (fallInited) return; fallInited = true;
    fallFloorY = viewportBottom();
    fallEngine = Matter.Engine.create(); fallWorld = fallEngine.world;
    fallEngine.gravity.y = 1.2;
    fallGround = Matter.Bodies.rectangle(window.innerWidth / 2, fallFloorY + 30, window.innerWidth * 4, 60, { isStatic: true });
    fallLeft   = Matter.Bodies.rectangle(-30, fallFloorY / 2, 60, fallFloorY * 2, { isStatic: true });
    fallRight  = Matter.Bodies.rectangle(window.innerWidth + 30, fallFloorY / 2, 60, fallFloorY * 2, { isStatic: true });
    Matter.World.add(fallWorld, [fallGround, fallLeft, fallRight]);
    window.addEventListener('scroll', () => {
      const ny = viewportBottom(); if (ny <= fallFloorY) return; fallFloorY = ny;
      Matter.Body.setPosition(fallGround, { x: window.innerWidth / 2, y: fallFloorY + 30 });
      Matter.Body.setPosition(fallLeft,   { x: -30,                    y: fallFloorY / 2  });
      Matter.Body.setPosition(fallRight,  { x: window.innerWidth + 30, y: fallFloorY / 2  });
    });
    setInterval(() => Matter.Engine.update(fallEngine, 1000 / 60), 1000 / 60);
  }

  function dropFall(span) {
    if (span._dispatched) return; span._dispatched = true; initFall();
    const rect = span.getBoundingClientRect();
    const docX = rect.left + rect.width / 2 + window.scrollX;
    const docY = rect.top + rect.height / 2 + window.scrollY;
    const startY = Math.min(docY, fallFloorY - 20);
    const el = document.createElement('span');
    el.className = 'fly-word'; el.style.position = 'absolute';
    el.style.left = '-9999px'; el.style.top = '-9999px';
    el.textContent = span.textContent.trim(); el.style.color = span.style.color || '#f5c800';
    document.body.appendChild(el);
    const w = Math.max(el.offsetWidth, 10) + 6, h = Math.max(el.offsetHeight, 10) + 6;
    const body = Matter.Bodies.rectangle(docX, startY, w, h, { restitution: 0.4, friction: 0.3, frictionAir: 0.012, angle: (Math.random() - 0.5) * 0.4 });
    Matter.Body.setVelocity(body, { x: (Math.random() - 0.5) * 4, y: 2 + Math.random() * 2 });
    Matter.World.add(fallWorld, body); fallBodies.push({ body, el, span });
    span.style.visibility = 'hidden';
  }

  // --- FLOAT ---
  function dropFloat(span) {
    if (span._dispatched) return; span._dispatched = true;
    const rect = span.getBoundingClientRect();
    const el = document.createElement('span');
    el.className = 'fly-word'; el.style.position = 'fixed';
    el.style.left = rect.left + 'px'; el.style.top = rect.top + 'px';
    el.style.color = span.style.color || '#f5c800';
    el.style.animation = `float-up ${2 + Math.random()}s ease-in forwards`;
    el.textContent = span.textContent.trim();
    document.body.appendChild(el); span.style.visibility = 'hidden';
    setTimeout(() => el.remove(), 3200);
  }

  // --- BOUNCE ---
  function dropBounce(span) {
    if (span._dispatched) return; span._dispatched = true;
    const rect = span.getBoundingClientRect();
    const el = document.createElement('span');
    el.className = 'fly-word'; el.style.position = 'fixed';
    el.style.left = rect.left + 'px'; el.style.top = rect.top + 'px';
    el.style.color = span.style.color || '#f5c800';
    el.textContent = span.textContent.trim();
    document.body.appendChild(el); span.style.visibility = 'hidden';
    const speed = 2.5 + Math.random() * 4, angle = Math.random() * Math.PI * 2;
    bouncingWords.push({ el, x: rect.left, y: rect.top, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed });
  }

  function dropWord(span) {
    if (displayMode === 'fall')   dropFall(span);
    else if (displayMode === 'float')  dropFloat(span);
    else if (displayMode === 'bounce') dropBounce(span);
  }

  function dropAllLit() {
    spans.forEach(span => { if (span.classList.contains('lit') && !span._dispatched) dropWord(span); });
  }

  // --- mode buttons ---
  const modeBtns = document.querySelectorAll('.mode-btn');
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      displayMode = btn.id.replace('mode-', '');
      modeBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active');
      if (displayMode !== 'list' && running) dropAllLit();
    });
  });

  // --- color modes ---
  let colorMode = 'bee';
  const RAINBOW_COLORS = ['#ff3333','#ff8800','#ffee00','#33dd55','#3399ff','#aa44ff','#ff44cc'];

  function getWordColor(i) {
    switch (colorMode) {
      case 'rainbow': return RAINBOW_COLORS[i % RAINBOW_COLORS.length];
      case 'matrix':  return `hsl(120,100%,${35 + (i % 6) * 6}%)`;
      case 'chaos':   return `hsl(${Math.round(i * 137.508) % 360},90%,62%)`;
      default:        return i % 2 === 0 ? '#f5c800' : '#111111';
    }
  }

  const cmodeButtons = document.querySelectorAll('.cmode-btn');
  cmodeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      colorMode = btn.id.replace('cmode-', '');
      cmodeButtons.forEach(b => b.classList.remove('active')); btn.classList.add('active');
      spans.forEach((span, i) => { if (span.classList.contains('lit')) span.style.color = getWordColor(i); });
    });
  });

  // --- save button ---
  saveBtnEl.addEventListener('click', () => {
    if (litCount > 0) {
      scoreSaved = false; saveScore(playerName, litCount);
      saveBtnEl.textContent = 'SAVED!';
      setTimeout(() => { saveBtnEl.textContent = 'SAVE'; }, 1800);
    }
  });

  // --- light up a word ---
  function lightWord(globalIdx) {
    if (globalIdx >= spans.length) return;
    spans[globalIdx].classList.add('lit');
    spans[globalIdx].style.color = getWordColor(globalIdx);
    litCount = Math.max(litCount, globalIdx + 1);
    const pct = litCount / words.length * 100;
    progressBar.style.width = pct.toFixed(1) + '%';
    wordCount.textContent   = `${litCount.toLocaleString()} / ${words.length.toLocaleString()}`;
    checkMilestones(pct);
    if (displayMode === 'list') {
      spans[globalIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    } else {
      const captured = spans[globalIdx];
      setTimeout(() => { if (!captured._dispatched) dropWord(captured); }, 3000);
    }
  }

  // --- speak a sentence ---
  function speakSentence(si) {
    if (!running || paused || si >= sentences.length) {
      if (si >= sentences.length) { running = false; saveScore(playerName, litCount); }
      return;
    }
    const s = sentences[si];
    const utt = new SpeechSynthesisUtterance(s.text);
    utt.pitch = parseFloat(pitchEl.value); utt.rate = ttsRate();
    const vi = parseInt(voiceSelect.value);
    if (voices[vi]) utt.voice = voices[vi];
    utt.onboundary = (e) => {
      if (e.name !== 'word') return;
      const idx = s.charMap[e.charIndex]; if (idx !== undefined) lightWord(idx);
    };
    utt.onstart = () => { lightWord(s.start); speakSentence(si + 1); };
    utt.onend   = () => { for (let i = s.start; i < s.end; i++) { if (!spans[i].classList.contains('lit')) lightWord(i); } };
    speechSynthesis.speak(utt); sentIdx = si + 1;
  }

  // --- pause / resume ---
  pauseBtn.addEventListener('click', () => {
    paused = !paused; pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    if (paused) { speechSynthesis.pause(); if (litCount > 0) saveScore(playerName, litCount); }
    else { scoreSaved = false; speechSynthesis.resume(); }
  });

  // =============================================
  // BEES
  // =============================================
  const beeContainer = document.getElementById('bees');
  let activeBeeCount = 0;
  const TARGET_BEES  = 22;

  function spawnBee() {
    const bee     = document.createElement('img');
    bee.src       = 'bee.png';
    bee.className = 'bee';
    const goRight = Math.random() > 0.5;
    const size    = 108 + Math.random() * 216;
    const topPct  = 2 + Math.random() * 88;
    const dur     = 6 + Math.random() * 18;
    const delay   = -(Math.random() * dur);
    const wob     = 1.2 + Math.random() * 1.8;

    bee.style.cssText = `
      width: ${size}px; top: ${topPct}vh;
      animation:
        ${goRight ? 'fly-right' : 'fly-left'} ${dur}s ${delay}s linear infinite,
        wobble ${wob}s ease-in-out infinite;
      opacity: ${0.55 + Math.random() * 0.45};
    `;

    bee.addEventListener('click', () => {
      if (!running) return;
      bee.classList.add('caught');
      beesCollected++;
      beeCounterEl.textContent = `  collected: ${beesCollected}`;

      // persistent total + achievement check
      progress.beesTotal++;
      saveProgress(progress);
      checkAchievements('bees');

      activeBeeCount--;
      setTimeout(() => {
        bee.remove();
        // respawn after a short delay to keep count at TARGET_BEES
        setTimeout(() => { spawnBee(); activeBeeCount++; }, 800 + Math.random() * 1200);
      }, 300);
    });

    if (running) bee.classList.add('catchable');
    beeContainer.appendChild(bee);
    activeBeeCount++;
  }

  // initial swarm
  for (let i = 0; i < TARGET_BEES; i++) spawnBee();

  // =============================================
  // TIME TRACKING
  // =============================================
  let saveProgressTick = 0;
  setInterval(() => {
    if (!running || paused) return;
    progress.listeningSeconds++;
    saveProgressTick++;
    if (saveProgressTick >= 10) { saveProgress(progress); saveProgressTick = 0; }
    checkAchievements('time');
  }, 1000);

  // =============================================
  // START
  // =============================================
  startBtn.addEventListener('click', async () => {
    playerName = playerNameEl.value.trim() || 'anonymous';
    liveSpeed.value = speedEl.value;

    const res = await fetch(SCRIPT_FILE);
    if (!res.ok) { alert('Could not load vibes.txt'); return; }
    const text = await res.text();

    words = text.trim().split(/\s+/);
    wordCount.textContent = `0 / ${words.length.toLocaleString()}`;

    renderAll(); buildSentences(); buildMilestones();

    overlay.style.opacity = '0'; overlay.style.pointerEvents = 'none';
    hud.classList.add('visible'); header.classList.add('visible');
    loadLeaderboard();

    document.querySelectorAll('.bee').forEach(b => b.classList.add('catchable'));

    running = true; speakSentence(0);
  });
</script>
</body>
</html>
