<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>beelieveInYourself</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #555;
      color: #f5c800;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #overlay h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.1em;
      text-align: center;
      text-shadow: 0 0 30px #f5c800aa;
    }

    #overlay p {
      color: #111;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #start-btn {
      background: #f5c800;
      color: #0a0a00;
      border: none;
      padding: 16px 48px;
      font-size: 1.4rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 0 20px #f5c80066;
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px #f5c800aa;
    }

    #start-btn:active { transform: scale(0.97); }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #111;
      font-size: 0.85rem;
    }

    #speed {
      accent-color: #f5c800;
      width: 260px;
      cursor: pointer;
    }

    #words {
      padding: 48px 5vw 200px;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      line-height: 1.9;
      word-spacing: 0.25em;
      max-width: 100%;
    }

    .word { display: inline; }

    .word.new {
      animation: pop 0.12s ease-out;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.8); }
      60%  { opacity: 1; transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px 16px;
      background: linear-gradient(transparent, #555555dd 40%, #555);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #hud.visible {
      opacity: 1;
      pointer-events: all;
    }

    #pause-btn {
      background: transparent;
      border: 1px solid #f5c800;
      color: #f5c800;
      padding: 6px 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #pause-btn:hover { background: #f5c80022; }

    #progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #progress {
      position: relative;
      height: 6px;
      background: #333;
      border-radius: 3px;
    }

    #progress-bar {
      height: 100%;
      background: #f5c800;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s linear;
    }

    .milestone {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid #333;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      z-index: 2;
    }

    .milestone.reached {
      background: #f5c800;
      border-color: #f5c800;
    }

    .milestone-label {
      position: absolute;
      bottom: 14px;
      transform: translateX(-50%);
      background: #222;
      color: #f5c800;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      padding: 3px 6px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .milestone:hover .milestone-label,
    .milestone.reached:hover .milestone-label { opacity: 1; }

    #word-count {
      color: #333;
      font-size: 0.75rem;
      min-width: 90px;
      text-align: right;
      flex-shrink: 0;
    }

    #live-speed {
      accent-color: #f5c800;
      width: 120px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #milestone-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #111;
      color: #f5c800;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 10px 20px;
      border: 1px solid #f5c800;
      border-radius: 4px;
      z-index: 200;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      max-width: 80vw;
    }

    #milestone-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>🐝 beelieveInYourself</h1>
  <p>according to all known laws of aviation...</p>
  <div class="controls">
    <div class="speed-row">
      <span>slow</span>
      <input type="range" id="speed" min="1" max="50" value="15" />
      <span>fast</span>
    </div>
    <button id="start-btn">START</button>
  </div>
</div>

<div id="words"></div>
<div id="milestone-toast"></div>

<div id="hud">
  <button id="pause-btn">PAUSE</button>
  <input type="range" id="live-speed" min="1" max="50" value="15" />
  <div id="progress-wrap">
    <div id="progress">
      <div id="progress-bar"></div>
    </div>
  </div>
  <span id="word-count">0 / 0</span>
</div>

<script>
  const SCRIPT_FILE = 'vibes.txt';

  // Milestones: [approximate % through the script, emoji + label]
  const MILESTONES = [
    { pct:  2,  icon: '🐝', label: 'Yellow, black. Yellow, black.' },
    { pct: 14,  icon: '🎓', label: 'Graduation Day' },
    { pct: 27,  icon: '🎷', label: 'You like jazz?' },
    { pct: 33,  icon: '🌸', label: 'Meeting Vanessa' },
    { pct: 38,  icon: '🧠', label: 'Thinking bee!' },
    { pct: 45,  icon: '🍯', label: 'Honey Farms discovered' },
    { pct: 57,  icon: '⚖️',  label: 'The trial begins' },
    { pct: 68,  icon: '🎤', label: 'Mr. Sting takes the stand' },
    { pct: 73,  icon: '✊', label: 'FREE THE BEES!' },
    { pct: 75,  icon: '🏆', label: 'The bees win!' },
    { pct: 84,  icon: '🌺', label: 'Flowers are dying...' },
    { pct: 91,  icon: '✈️',  label: 'Barry flies the plane' },
    { pct: 97,  icon: '🛬', label: 'Barry, we did it!' },
    { pct: 100, icon: '🎬', label: 'No rehearsal for that.' },
  ];

  const overlay     = document.getElementById('overlay');
  const wordsEl     = document.getElementById('words');
  const hud         = document.getElementById('hud');
  const pauseBtn    = document.getElementById('pause-btn');
  const speedEl     = document.getElementById('speed');
  const liveSpeed   = document.getElementById('live-speed');
  const progressBar = document.getElementById('progress-bar');
  const progressEl  = document.getElementById('progress');
  const wordCount   = document.getElementById('word-count');
  const startBtn    = document.getElementById('start-btn');
  const toast       = document.getElementById('milestone-toast');

  let words = [];
  let idx = 0;
  let paused = false;
  let timer = null;
  let toastTimer = null;
  let nextMilestone = 0;

  function msPerWord(val) {
    // val 1-50 → ~800ms down to ~8ms
    return Math.round(800 / (val ** 1.4));
  }

  function showToast(text) {
    clearTimeout(toastTimer);
    toast.textContent = text;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function buildMilestones() {
    MILESTONES.forEach((m, i) => {
      const dot = document.createElement('div');
      dot.className = 'milestone';
      dot.id = `ms-${i}`;
      dot.style.left = m.pct + '%';

      const lbl = document.createElement('div');
      lbl.className = 'milestone-label';
      lbl.textContent = `${m.icon} ${m.label}`;
      dot.appendChild(lbl);

      progressEl.appendChild(dot);
    });
  }

  function checkMilestones(pct) {
    while (nextMilestone < MILESTONES.length && pct >= MILESTONES[nextMilestone].pct) {
      const m = MILESTONES[nextMilestone];
      const dot = document.getElementById(`ms-${nextMilestone}`);
      if (dot) dot.classList.add('reached');
      showToast(`${m.icon} ${m.label}`);
      nextMilestone++;
    }
  }

  function addWord() {
    if (paused || idx >= words.length) {
      if (idx >= words.length) clearInterval(timer);
      return;
    }

    const span = document.createElement('span');
    span.className = 'word new';
    span.style.color = idx % 2 === 0 ? '#f5c800' : '#111';
    span.textContent = words[idx] + ' ';
    wordsEl.appendChild(span);
    setTimeout(() => span.classList.remove('new'), 200);

    idx++;
    const pct = idx / words.length * 100;
    progressBar.style.width = pct.toFixed(1) + '%';
    wordCount.textContent = `${idx.toLocaleString()} / ${words.length.toLocaleString()}`;
    checkMilestones(pct);

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'instant' });
  }

  function startInterval() {
    clearInterval(timer);
    const ms = msPerWord(+liveSpeed.value);
    timer = setInterval(addWord, ms);
  }

  liveSpeed.addEventListener('input', () => {
    if (!paused) startInterval();
  });

  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    if (!paused) startInterval();
  });

  startBtn.addEventListener('click', async () => {
    liveSpeed.value = speedEl.value;

    const res = await fetch(SCRIPT_FILE);
    if (!res.ok) { alert('Could not load vibes.txt'); return; }
    const text = await res.text();

    words = text.trim().split(/\s+/);
    wordCount.textContent = `0 / ${words.length.toLocaleString()}`;

    buildMilestones();

    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    hud.classList.add('visible');

    startInterval();
  });
</script>
</body>
</html>
